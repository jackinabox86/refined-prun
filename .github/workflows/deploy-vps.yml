# Builds the extension and deploys dist/ to your VPS on every push.
#
# One-time VPS setup:
#   1. Install Docker + Docker Compose on your VPS
#   2. Clone this repo:  git clone <repo-url> ~/rprun
#   3. Set a real password in docker-compose.yml (VNC_PASSWORD)
#   4. Build and start:  cd ~/rprun && docker compose up -d --build
#   5. Visit http://YOUR_VPS_IP:6080/vnc.html and log into PrUn
#      (login is saved in the chrome-profile volume — you only do this once)
#
# GitHub Secrets required (Settings → Secrets → Actions):
#   VPS_HOST     — IP or hostname of your VPS
#   VPS_USER     — SSH username (e.g. root or ubuntu)
#   VPS_SSH_KEY  — Private SSH key (the public key must be in ~/.ssh/authorized_keys on VPS)

name: Deploy to VPS

on:
  push:
    branches: ['**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Sync dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/"
          target: "~/rprun/"

      - name: Restart browser
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: cd ~/rprun && docker compose restart browser
