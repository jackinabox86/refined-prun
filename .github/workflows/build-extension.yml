name: Build Refined PrUn ZIP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # This repo uses pnpm-lock.yaml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install Dependencies
        run: pnpm install
          
      - name: Build Extension
        run: pnpm run build
          
      - name: Upload Zip
        uses: actions/upload-artifact@v4
        with:
          name: refined-prun-build
          path: dist/  # Vite default output folder
