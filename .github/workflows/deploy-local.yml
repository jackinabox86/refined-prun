# Builds the extension and relaunches Chrome on your home laptop on every push.
# Requires a self-hosted GitHub Actions runner installed on the laptop.
#
# One-time runner setup (on the laptop):
#   1. GitHub repo → Settings → Actions → Runners → New self-hosted runner → Windows
#   2. Follow the download + configure steps shown (runs config.cmd)
#   3. Do NOT run the suggested ./svc.sh or install-svc command — that installs a
#      Windows service which runs in Session 0 and cannot launch visible Chrome windows.
#   4. Instead, open Task Scheduler and create a new task:
#        General:   Run only when user is logged on | Run with highest privileges
#        Trigger:   At log on → your user account
#        Action:    Start a program
#                   Program: C:\actions-runner\run.cmd   (wherever you extracted the runner)
#        Conditions: uncheck "Start only if on AC power"
#   5. Log off and back on — the runner will appear Online in GitHub.

name: Deploy to Local Runner

on:
  push:
    branches: ['**']

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Restart Chrome with new build
        shell: powershell
        run: |
          Get-WmiObject Win32_Process |
            Where-Object { $_.CommandLine -like "*rprun-test-profile*" } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }
          Start-Sleep -Seconds 2

          $chrome = $null
          foreach ($path in @(
            "$env:LOCALAPPDATA\Google\Chrome\Application\chrome.exe",
            "$env:PROGRAMFILES\Google\Chrome\Application\chrome.exe",
            "${env:PROGRAMFILES(X86)}\Google\Chrome\Application\chrome.exe"
          )) {
            if (Test-Path $path) { $chrome = $path; break }
          }
          if (-not $chrome) { Write-Error "Chrome not found"; exit 1 }

          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          $profile = "$env:LOCALAPPDATA\rprun-test-profile"
          Write-Host "Chrome: $chrome"
          Write-Host "dist: $dist"
          Write-Host "manifest.json exists: $(Test-Path (Join-Path $dist 'manifest.json'))"
          Start-Process $chrome -ArgumentList "--load-extension=$dist", "--user-data-dir=$profile", "https://apex.prosperousuniverse.com"
